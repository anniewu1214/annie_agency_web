<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <script>
      const segment = 1;
      const path = location.pathname
        .split('/')
        .slice(segment + 1)
        .join('/');
      const base = location.pathname
        .split('/')
        .slice(0, segment + 1)
        .join('/');
      sessionStorage.setItem('redirect', path);
      location.replace(base || '/');
    </script>
  </body>
</html>
